<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>이겨냈다 💪</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="이겨냈다">
<meta name="theme-color" content="#0e0e12">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0e12;--surface:#1c1c25;--surface2:#26263200;--border:#35354a;
  --accent:#7c6ffd;--accent2:#3de6b0;--danger:#ff5a5a;
  --text:#f4f4ff;--text2:#aaaacc;--text3:#6666888;
  --radius:16px;--radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif}
.shell{max-width:430px;margin:0 auto;height:100dvh;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Header */
.header{padding:20px 20px 0;flex-shrink:0}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.app-title{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:var(--accent);letter-spacing:-.02em}
.date-badge{font-size:11px;color:#aaaacc;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 10px}
.stat-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 10px;text-align:center}
.stat-box .num{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--text);line-height:1}
.stat-box .num.accent{color:var(--accent2)}
.stat-box .lbl{font-size:10px;color:#8888aa;margin-top:4px;white-space:nowrap}

/* Tab bar */
.tab-bar{display:flex;background:var(--surface);border-radius:12px;padding:4px;margin:0 20px 14px;flex-shrink:0}
.tab{flex:1;text-align:center;font-size:13px;font-weight:500;color:#8888aa;padding:9px 4px;border-radius:9px;cursor:pointer;transition:all .18s;user-select:none}
.tab.active{background:var(--bg);color:#f4f4ff;border:1px solid var(--border)}

/* Content scroll */
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 20px 32px;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{display:none}
.page{display:none}
.page.active{display:block}
.slabel{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#6666aa;margin-bottom:10px}

/* Habit card */
.habit-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:10px;transition:border-color .15s}
.hico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.hinfo{flex:1;min-width:0}
.hname{font-size:15px;font-weight:700;color:#f4f4ff}
.hsub{font-size:12px;color:#aaaacc;margin-top:2px}
.progress-track{height:3px;background:#2a2a3a;border-radius:2px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:2px;transition:width .4s ease}
.habit-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.win-btn{background:none;border:1px solid var(--border);border-radius:10px;padding:8px 11px;font-size:13px;font-weight:700;color:#ccccee;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:'Noto Sans KR',sans-serif}
.win-btn.won{background:rgba(61,230,176,.15);border-color:var(--accent2);color:var(--accent2)}
.edit-ico-btn{width:34px;height:34px;background:none;border:1px solid var(--border);border-radius:9px;color:#8888aa;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.edit-ico-btn:active{color:var(--accent);border-color:var(--accent);background:rgba(124,111,253,.1)}

/* Add button inline */
.add-inline-btn{width:100%;height:46px;background:none;border:1.5px dashed var(--border);border-radius:var(--radius);color:#8888aa;font-size:14px;font-weight:500;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .2s;margin-top:2px;display:flex;align-items:center;justify-content:center;gap:8px}
.add-inline-btn:active{border-color:var(--accent);color:var(--accent)}

.empty{text-align:center;color:#666688;font-size:13px;padding:40px 0;line-height:1.8}

/* Calendar page */
.cal-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cal-fbtn{padding:6px 13px;font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;border:1px solid var(--border);border-radius:20px;background:none;color:#aaaacc;cursor:pointer;white-space:nowrap;transition:all .15s}
.cal-fbtn.active{color:#f4f4ff;border-color:#f4f4ff}
.cal-month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-month-label{font-size:15px;font-weight:700;color:#f4f4ff}
.cal-nav-btn{width:34px;height:34px;background:var(--surface);border:1px solid var(--border);border-radius:9px;color:#aaaacc;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav-btn:active{border-color:var(--accent);color:var(--accent)}
.cal-grid-header{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:#6666aa;padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;position:relative;cursor:default}
.cal-day-num{font-size:10px;color:#8888aa;line-height:1;margin-bottom:3px}
.cal-day-num.today{color:var(--accent2);font-weight:700}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;max-width:28px}
.cal-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.cal-cell.other-month .cal-day-num{color:#3a3a55}
.cal-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#aaaacc}
.cal-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* History */
.hist-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.hfbtn{padding:6px 13px;font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;border:1px solid var(--border);border-radius:20px;background:none;color:#aaaacc;cursor:pointer;white-space:nowrap;transition:all .15s}
.hfbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.hist-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface);border-radius:var(--radius-sm);margin-bottom:7px;border:1px solid var(--border)}
.h-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.h-text{flex:1;font-size:13px;color:#e0e0f0}
.h-time{font-family:'Space Mono',monospace;font-size:11px;color:#6666aa;flex-shrink:0}
.hist-day-label{font-size:11px;font-weight:700;color:#6666aa;letter-spacing:.06em;text-transform:uppercase;padding:14px 0 7px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal-box{width:100%;max-width:430px;background:#1c1c25;border-radius:var(--radius) var(--radius) 0 0;padding:24px 20px 36px;transform:translateY(100%);transition:transform .26s cubic-bezier(.32,1,.23,1)}
.modal-overlay.show .modal-box{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.edit-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.edit-emoji-big{width:56px;height:56px;border-radius:14px;font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;user-select:none;border:2px solid transparent}
.edit-emoji-big:active{opacity:.8}
.edit-name-input{width:100%;height:48px;background:#26263a;border:1px solid var(--border);border-radius:var(--radius-sm);color:#f4f4ff;font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;padding:0 14px;outline:none;transition:border-color .15s;-webkit-appearance:none}
.edit-name-input::placeholder{color:#555577}
.edit-name-input:focus{border-color:var(--accent)}

/* Color picker */
.color-section{margin-bottom:16px}
.color-section-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#6666aa;margin-bottom:10px}
.color-swatches{display:flex;gap:8px;flex-wrap:wrap}
.swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;flex-shrink:0}
.swatch.sel{border-color:#f4f4ff;transform:scale(1.15)}

/* Emoji picker panel */
.emoji-panel{background:#26263a;border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:14px;display:none}
.emoji-panel.open{display:block}
.emoji-panel-title{font-size:10px;color:#6666aa;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.ep{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:22px;border-radius:10px;background:#1c1c25;border:1.5px solid transparent;cursor:pointer;transition:all .12s;user-select:none}
.ep.sel,.ep:active{border-color:var(--accent);background:rgba(124,111,253,.15)}

.edit-action-row{display:flex;gap:10px;margin-top:4px}
.mbtn{flex:1;height:50px;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:opacity .15s}
.mbtn:active{opacity:.75}
.mbtn.save{background:var(--accent);color:#fff}
.mbtn.delete{background:rgba(255,90,90,.12);color:#ff7070;border:1px solid rgba(255,90,90,.25)}
.del-confirm{display:none;text-align:center;padding:8px 0 4px}
.del-confirm.show{display:block}
.del-confirm-title{font-size:16px;font-weight:700;color:#f4f4ff;margin-bottom:8px}
.del-confirm-sub{font-size:13px;color:#aaaacc;line-height:1.6;margin-bottom:20px}
.del-confirm-btns{display:flex;gap:10px}
.mbtn.cancel{background:#26263a;color:#aaaacc}
.mbtn.confirm-del{background:var(--danger);color:#fff}

/* Add form (shown as modal-style page) */
.add-form-inner{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.form-row{display:flex;gap:8px;align-items:stretch;margin-bottom:12px}
.add-emoji-btn{width:48px;height:48px;border-radius:var(--radius-sm);font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;user-select:none;border:2px solid transparent}
.name-input{flex:1;height:48px;background:#26263a;border:1px solid var(--border);border-radius:var(--radius-sm);color:#f4f4ff;font-size:15px;font-family:'Noto Sans KR',sans-serif;padding:0 14px;outline:none;transition:border-color .15s;-webkit-appearance:none}
.name-input::placeholder{color:#555577}
.name-input:focus{border-color:var(--accent)}
.add-submit-btn{width:100%;height:48px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:opacity .15s;margin-top:4px}
.add-submit-btn:active{opacity:.8}

#cfv{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
@keyframes flash{0%{background:rgba(61,230,176,.18)}100%{background:var(--surface)}}
.habit-card.flashing{animation:flash .6s ease-out}
@supports(padding-bottom:env(safe-area-inset-bottom)){
  .content{padding-bottom:calc(32px + env(safe-area-inset-bottom))}
  .modal-box{padding-bottom:calc(36px + env(safe-area-inset-bottom))}
}
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="header-top">
      <div class="app-title">이겨냈다 💪</div>
      <div class="date-badge" id="dateBadge"></div>
    </div>
    <div class="stat-strip" id="stats"></div>
  </div>
  <div class="tab-bar">
    <div class="tab active" onclick="showPage('home')">내 목표</div>
    <div class="tab" onclick="showPage('history')">기록</div>
    <div class="tab" onclick="showPage('calendar')">달력</div>
  </div>
  <div class="content">

    <!-- 내 목표 -->
    <div class="page active" id="page-home">
      <div class="slabel">도전 중인 목표</div>
      <div id="habitList"></div>
      <button class="add-inline-btn" onclick="showPage('add')">＋ 새 목표 추가</button>
    </div>

    <!-- 기록 -->
    <div class="page" id="page-history">
      <div class="slabel">목표별 보기</div>
      <div class="hist-filter" id="histFilter"></div>
      <div id="histList"></div>
    </div>

    <!-- 달력 -->
    <div class="page" id="page-calendar">
      <div class="slabel">월별 기록</div>
      <div class="cal-filter" id="calFilter"></div>
      <div class="cal-month-nav">
        <button class="cal-nav-btn" onclick="calPrevMonth()">‹</button>
        <div class="cal-month-label" id="calMonthLabel"></div>
        <button class="cal-nav-btn" onclick="calNextMonth()">›</button>
      </div>
      <div class="cal-grid-header" id="calDowRow"></div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-legend" id="calLegend"></div>
    </div>

    <!-- 추가 -->
    <div class="page" id="page-add">
      <div class="slabel">새 목표 추가</div>
      <div class="add-form-inner">
        <div class="form-row">
          <div class="add-emoji-btn" id="addEmojiBtn" onclick="toggleAddPicker()" style="background:#26263a;border-color:var(--border)">🚬</div>
          <input class="name-input" type="text" id="newName" placeholder="이름 (예: 담배, 술...)" maxlength="16"/>
        </div>
        <div class="emoji-panel" id="addEmojiPanel">
          <div class="emoji-panel-title">이모티콘 선택</div>
          <div class="emoji-grid" id="addEmojiGrid"></div>
        </div>
        <div class="color-section">
          <div class="color-section-label">색상 선택</div>
          <div class="color-swatches" id="addColorSwatches"></div>
        </div>
        <button class="add-submit-btn" onclick="addHabit()">목표 추가하기</button>
      </div>
      <div class="slabel" style="margin-top:4px">팁</div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;font-size:13px;color:#aaaacc;line-height:1.7">
        유혹이 올 때마다 <strong style="color:var(--accent2)">이겼다!</strong> 버튼을 누르세요.<br>작은 승리를 쌓다 보면 습관이 바뀌어요.
      </div>
    </div>

  </div>
</div>

<!-- 편집 모달 -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div id="editView">
      <div class="edit-header">
        <div class="edit-emoji-big" id="editEmojiBtn" onclick="toggleEditPicker()">🚬</div>
        <input class="edit-name-input" type="text" id="editName" placeholder="목표 이름" maxlength="16" style="flex:1"/>
      </div>
      <div class="emoji-panel" id="editEmojiPanel">
        <div class="emoji-panel-title">이모티콘 선택</div>
        <div class="emoji-grid" id="editEmojiGrid"></div>
      </div>
      <div class="color-section">
        <div class="color-section-label">색상 선택</div>
        <div class="color-swatches" id="editColorSwatches"></div>
      </div>
      <div class="edit-action-row">
        <button class="mbtn save" onclick="confirmEdit()">저장</button>
        <button class="mbtn delete" onclick="showDelConfirm()">목표 삭제</button>
      </div>
    </div>
    <div class="del-confirm" id="delConfirmView">
      <div class="del-confirm-title">정말 삭제할까요?</div>
      <div class="del-confirm-sub" id="delConfirmSub"></div>
      <div class="del-confirm-btns">
        <button class="mbtn cancel" onclick="hideDelConfirm()">돌아가기</button>
        <button class="mbtn confirm-del" onclick="confirmDelete()">삭제하기</button>
      </div>
    </div>
  </div>
</div>

<canvas id="cfv"></canvas>

<script>
const EMOJIS=['🚬','🍺','🍰','☕','🍟','🎮','📱','🍫','🍷','🍪','🥤','🍕','🧁','🥃','🍜','🎲','🛒','💊','🧃','🍩','🍔','🧋','🎯','🏋️','💰','😴','🍦','🍭','🎪','🃏'];
const COLORS=['#7c6ffd','#3de6b0','#ff5a5a','#f5c842','#5bc8ff','#ff8c42','#e054c8','#64dd57','#ff6b8a','#42d4f4'];

let addSelEmoji='🚬';
let addSelColor=COLORS[0];
let editSelEmoji='🚬';
let editSelColor=COLORS[0];
let activeHistTab='all';
let activeCalTab='all';
let editingId=null;
let calYear=new Date().getFullYear();
let calMonth=new Date().getMonth();

let S={habits:[
  {id:1,name:'담배',emoji:'🚬',color:'#7c6ffd',wins:0,todayWins:0},
  {id:2,name:'술',emoji:'🍺',color:'#3de6b0',wins:0,todayWins:0}
],history:[],totalWins:0,nextId:3,today:''};
try{const sv=localStorage.getItem('cf6');if(sv)S=JSON.parse(sv);}catch(e){}

function todayStr(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');}
function checkDay(){const t=todayStr();if(S.today!==t){S.today=t;S.habits.forEach(h=>{h.todayWins=0;});save();}}
checkDay();
function save(){try{localStorage.setItem('cf6',JSON.stringify(S));}catch(e){}}

const DAYS=['일','월','화','수','목','금','토'];
document.getElementById('dateBadge').textContent=(()=>{const d=new Date();return`${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS[d.getDay()]})`;})();

function habitColor(h){return h.color||COLORS[0];}

function renderStats(){
  // total wins = sum of all habit wins
  const totalWins=S.habits.reduce((a,h)=>a+(h.wins||0),0);
  S.totalWins=totalWins;
  const today=S.habits.reduce((a,h)=>a+(h.todayWins||0),0);
  document.getElementById('stats').innerHTML=`
    <div class="stat-box"><div class="num accent">${today}</div><div class="lbl">오늘 승리</div></div>
    <div class="stat-box"><div class="num">${totalWins}</div><div class="lbl">누적 승리</div></div>
    <div class="stat-box"><div class="num">${S.habits.length}</div><div class="lbl">목표 수</div></div>`;
}

function renderHabits(){
  const el=document.getElementById('habitList');
  if(!S.habits.length){el.innerHTML='<div class="empty">아직 목표가 없어요</div>';return;}
  const maxWins=Math.max(...S.habits.map(h=>h.wins||0),1);
  el.innerHTML=S.habits.map(h=>{
    const col=habitColor(h);
    const pct=Math.round(((h.wins||0)/maxWins)*100);
    return`<div class="habit-card" id="hc-${h.id}">
      <div class="hico" style="background:${col}22">${h.emoji}</div>
      <div class="hinfo">
        <div class="hname">${h.name}</div>
        <div class="hsub">오늘 ${h.todayWins||0}번 · 누적 ${h.wins||0}승</div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${col}"></div></div>
      </div>
      <div class="habit-actions">
        <button class="win-btn" id="wb-${h.id}" onclick="recordWin(${h.id},event)">이겼다!</button>
        <button class="edit-ico-btn" onclick="openEdit(${h.id})" aria-label="편집">✎</button>
      </div>
    </div>`;}).join('');
}

/* History */
function renderHistFilter(){
  const tabs=[{id:'all',label:'전체'},...S.habits.map(h=>({id:String(h.id),label:h.emoji+' '+h.name,col:habitColor(h)}))];
  document.getElementById('histFilter').innerHTML=tabs.map(t=>`<button class="hfbtn${activeHistTab===t.id?' active':''}" style="${activeHistTab===t.id&&t.col?`background:${t.col};border-color:${t.col};color:#fff`:''}" onclick="setHistTab('${t.id}')">${t.label}</button>`).join('');
}
function renderHistList(){
  const el=document.getElementById('histList');
  let items=[...S.history].reverse();
  if(activeHistTab!=='all'){const nm=S.habits.find(h=>String(h.id)===activeHistTab)?.name;if(nm)items=items.filter(i=>i.name===nm);}
  if(!items.length){el.innerHTML='<div class="empty">아직 기록이 없어요<br>첫 승리를 만들어보세요 💪</div>';return;}
  let out='',lastDate='';
  items.slice(0,80).forEach(i=>{
    const d=i.date||todayStr();
    if(d!==lastDate){out+=`<div class="hist-day-label">${d===todayStr()?'오늘':d}</div>`;lastDate=d;}
    const col=S.habits.find(h=>h.id===i.habitId)?.color||'#3de6b0';
    out+=`<div class="hist-item"><div class="h-dot" style="background:${col}"></div><div class="h-text">${i.emoji} ${i.name} 유혹 이겨냄 🎉</div><div class="h-time">${i.time}</div></div>`;
  });
  el.innerHTML=out;
}
function setHistTab(id){activeHistTab=id;renderHistFilter();renderHistList();}

/* Calendar */
function renderCalFilter(){
  const tabs=[{id:'all',label:'전체'},...S.habits.map(h=>({id:String(h.id),label:h.emoji+' '+h.name}))];
  document.getElementById('calFilter').innerHTML=tabs.map(t=>`<button class="cal-fbtn${activeCalTab===t.id?' active':''}" onclick="setCalTab('${t.id}')">${t.label}</button>`).join('');
}
function setCalTab(id){activeCalTab=id;renderCalFilter();renderCal();}
function calPrevMonth(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCal();}
function calNextMonth(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCal();}

function renderCal(){
  const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calMonthLabel').textContent=`${calYear}년 ${monthNames[calMonth]}`;

  // dow headers
  document.getElementById('calDowRow').innerHTML=DAYS.map(d=>`<div class="cal-dow">${d}</div>`).join('');

  const today=todayStr();
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();

  // build dot map: date -> [{color}]
  const dotMap={};
  S.history.forEach(item=>{
    const d=item.date||'';
    if(!d)return;
    const [y,m]=d.split('-').map(Number);
    if(y!==calYear||m-1!==calMonth)return;
    if(activeCalTab!=='all'&&String(item.habitId)!==activeCalTab)return;
    if(!dotMap[d])dotMap[d]=[];
    const col=S.habits.find(h=>h.id===item.habitId)?.color||'#3de6b0';
    if(!dotMap[d].find(c=>c===col))dotMap[d].push(col);
  });

  let cells='';
  // empty cells before first day
  for(let i=0;i<firstDay;i++)cells+=`<div class="cal-cell other-month"><div class="cal-day-num"></div></div>`;
  for(let day=1;day<=daysInMonth;day++){
    const dStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dots=(dotMap[dStr]||[]);
    const isToday=dStr===today;
    const dotsHtml=dots.slice(0,6).map(c=>`<div class="cal-dot" style="background:${c}"></div>`).join('');
    cells+=`<div class="cal-cell">
      <div class="cal-day-num${isToday?' today':''}">${day}</div>
      <div class="cal-dots">${dotsHtml}</div>
    </div>`;
  }
  document.getElementById('calGrid').innerHTML=cells;

  // legend
  const visHabits=activeCalTab==='all'?S.habits:S.habits.filter(h=>String(h.id)===activeCalTab);
  document.getElementById('calLegend').innerHTML=visHabits.map(h=>`<div class="cal-legend-item"><div class="cal-legend-dot" style="background:${habitColor(h)}"></div>${h.emoji} ${h.name}</div>`).join('');
}

function recordWin(id,e){
  e.stopPropagation();
  const h=S.habits.find(x=>x.id===id);if(!h)return;
  h.wins=(h.wins||0)+1;h.todayWins=(h.todayWins||0)+1;
  const now=new Date();
  S.history.push({name:h.name,emoji:h.emoji,time:now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0'),habitId:h.id,date:todayStr()});
  save();renderStats();renderHabits();
  const btn=document.getElementById('wb-'+id);
  if(btn){btn.classList.add('won');btn.textContent='이겼어요! ✓';setTimeout(()=>{btn.classList.remove('won');btn.textContent='이겼다!';},1400);}
  const card=document.getElementById('hc-'+id);
  if(card){card.classList.add('flashing');setTimeout(()=>card.classList.remove('flashing'),700);}
  confetti(habitColor(h));
}

/* Edit modal */
function openEdit(id){
  editingId=id;
  const h=S.habits.find(x=>x.id===id);
  editSelEmoji=h.emoji;
  editSelColor=habitColor(h);
  document.getElementById('editName').value=h.name;
  const eb=document.getElementById('editEmojiBtn');
  eb.textContent=h.emoji;
  eb.style.background=editSelColor+'22';
  eb.style.borderColor=editSelColor;
  document.getElementById('editEmojiPanel').classList.remove('open');
  hideDelConfirm();
  renderEditColorSwatches();
  document.getElementById('editModal').classList.add('show');
}
function closeEditModal(){document.getElementById('editModal').classList.remove('show');hideDelConfirm();}
document.getElementById('editModal').addEventListener('click',e=>{if(e.target===document.getElementById('editModal'))closeEditModal();});

function confirmEdit(){
  const name=document.getElementById('editName').value.trim();if(!name)return;
  const h=S.habits.find(x=>x.id===editingId);
  if(h){h.name=name;h.emoji=editSelEmoji;h.color=editSelColor;
    S.history.forEach(i=>{if(i.habitId===editingId){i.name=name;i.emoji=editSelEmoji;}});}
  save();renderStats();renderHabits();closeEditModal();
}

function showDelConfirm(){
  const h=S.habits.find(x=>x.id===editingId);
  document.getElementById('delConfirmSub').innerHTML=`<strong style="color:#f4f4ff">${h.emoji} ${h.name}</strong> 목표와<br>관련된 기록이 모두 사라져요.`;
  document.getElementById('editView').style.display='none';
  document.getElementById('delConfirmView').classList.add('show');
}
function hideDelConfirm(){
  document.getElementById('editView').style.display='';
  document.getElementById('delConfirmView').classList.remove('show');
}
function confirmDelete(){
  // 삭제된 목표의 wins만큼 totalWins에서 차감은 renderStats에서 재계산하므로 불필요
  S.habits=S.habits.filter(h=>h.id!==editingId);
  S.history=S.history.filter(i=>i.habitId!==editingId);
  save();renderStats();renderHabits();closeEditModal();
}

/* Edit emoji picker */
function toggleEditPicker(){
  const p=document.getElementById('editEmojiPanel');
  const open=!p.classList.contains('open');
  p.classList.toggle('open',open);
  if(open)renderEditEmojiGrid();
}
function renderEditEmojiGrid(){
  document.getElementById('editEmojiGrid').innerHTML=EMOJIS.map(e=>`<div class="ep${editSelEmoji===e?' sel':''}" onclick="pickEditEmoji('${e}')">${e}</div>`).join('');
}
function pickEditEmoji(e){
  editSelEmoji=e;
  document.getElementById('editEmojiBtn').textContent=e;
  document.getElementById('editEmojiPanel').classList.remove('open');
  renderEditEmojiGrid();
}

/* Color swatches */
function renderAddColorSwatches(){
  document.getElementById('addColorSwatches').innerHTML=COLORS.map(c=>`<div class="swatch${addSelColor===c?' sel':''}" style="background:${c}" onclick="pickAddColor('${c}')"></div>`).join('');
}
function pickAddColor(c){addSelColor=c;document.getElementById('addEmojiBtn').style.background=c+'22';document.getElementById('addEmojiBtn').style.borderColor=c;renderAddColorSwatches();}

function renderEditColorSwatches(){
  document.getElementById('editColorSwatches').innerHTML=COLORS.map(c=>`<div class="swatch${editSelColor===c?' sel':''}" style="background:${c}" onclick="pickEditColor('${c}')"></div>`).join('');
}
function pickEditColor(c){
  editSelColor=c;
  const eb=document.getElementById('editEmojiBtn');
  eb.style.background=c+'22';eb.style.borderColor=c;
  renderEditColorSwatches();
}

/* Add emoji picker */
function toggleAddPicker(){
  const p=document.getElementById('addEmojiPanel');
  const open=!p.classList.contains('open');
  p.classList.toggle('open',open);
  if(open)renderAddEmojiGrid();
}
function renderAddEmojiGrid(){
  document.getElementById('addEmojiGrid').innerHTML=EMOJIS.map(e=>`<div class="ep${addSelEmoji===e?' sel':''}" onclick="pickAddEmoji('${e}')">${e}</div>`).join('');
}
function pickAddEmoji(e){
  addSelEmoji=e;
  document.getElementById('addEmojiBtn').textContent=e;
  document.getElementById('addEmojiPanel').classList.remove('open');
  renderAddEmojiGrid();
}

function addHabit(){
  const inp=document.getElementById('newName');
  const name=inp.value.trim();if(!name){inp.focus();return;}
  S.habits.push({id:S.nextId++,name,emoji:addSelEmoji,color:addSelColor,wins:0,todayWins:0});
  inp.value='';
  document.getElementById('addEmojiPanel').classList.remove('open');
  save();renderStats();renderHabits();showPage('home');
}
document.getElementById('newName').addEventListener('keydown',e=>{if(e.key==='Enter')addHabit();});
document.getElementById('editName').addEventListener('keydown',e=>{if(e.key==='Enter')confirmEdit();});

function showPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  const idx={home:0,history:1,calendar:2,add:99}[p];
  if(idx<3)document.querySelectorAll('.tab')[idx].classList.add('active');
  if(p==='history'){activeHistTab='all';renderHistFilter();renderHistList();}
  if(p==='calendar'){activeCalTab='all';renderCalFilter();renderCal();}
  if(p==='add'){renderAddColorSwatches();renderAddEmojiGrid();}
  document.querySelector('.content').scrollTop=0;
}

function confetti(mainColor){
  const cv=document.getElementById('cfv');const ctx=cv.getContext('2d');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const cols=[mainColor,'#f4f4ff','#ffdd55','#5bc8ff','#ff8c42'];
  const pieces=Array.from({length:55},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height*.2,r:Math.random()*6+2,c:cols[Math.floor(Math.random()*cols.length)],vx:(Math.random()-.5)*4,vy:Math.random()*4+1.5,life:1,rot:Math.random()*360}));
  let f=0;
  (function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    pieces.forEach(p=>{ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.c;ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);ctx.restore();p.x+=p.vx;p.y+=p.vy;p.life-=.018;p.rot+=4;});
    if(++f<80)requestAnimationFrame(draw);else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}

renderStats();renderHabits();
</script>
